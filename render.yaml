services:
  - type: web
    name: reco-partner-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # Set in Render UI
      - key: PORT
        value: 10000
